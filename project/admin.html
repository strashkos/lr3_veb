<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Адмін-панель</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="css/admin.css">
</head>

<body class="bg-light">
    <div class="container py-4">
        <h1 class="display-6">Адмін-панель магазину</h1>
        <a href="index.html" class="back-link btn btn-outline-secondary btn-sm mb-4">← На головну</a>

        <section id="loginSection" class="box card shadow-sm">
            <div class="card-body">
            <h2 class="h4">Вхід адміністратора</h2>
            <input type="text" id="adminLogin" class="form-control mb-2" placeholder="Логін">
            <input type="password" id="adminPassword" class="form-control mb-2" placeholder="Пароль">
            <button id="loginBtn" class="btn btn-primary">Увійти</button>
            <p id="loginMessage"></p>
            </div>
        </section>

        <section id="adminSection" class="box hidden card shadow-sm">
            <div class="card-body">
            <div class="admin-top">
                <h2 class="h4 mb-0">Керування товарами</h2>
                <button onclick="logoutAdmin()" class="btn btn-danger btn-sm">Вийти</button>
            </div>

            <form id="productForm">
                <input type="hidden" id="productId">

                <input type="text" id="productName" class="form-control mb-2" placeholder="Назва інструменту" required>
                <input type="text" id="productCategory" class="form-control mb-2" placeholder="Категорія" required>
                <input type="text" id="productManufacturer" class="form-control mb-2" placeholder="Виробник" required>
                <input type="number" id="productPrice" class="form-control mb-2" placeholder="Ціна" required>
                <input type="text" id="productImage" class="form-control mb-2" placeholder="Шлях до зображення (images/...)" required>
                <textarea id="productDescription" class="form-control mb-2" placeholder="Опис"></textarea>

                <button type="submit" class="btn btn-primary">Зберегти товар</button>
            </form>

            <h3 class="h5 mt-4">Список товарів</h3>
            <div id="adminProductsList"></div>

            <section id="categorySection" class="admin-subsection">
                <h2 class="h5">Керування категоріями</h2>
                <form id="categoryForm" class="inline-form">
                    <input type="text" id="categoryName" class="form-control" placeholder="Назва категорії">
                    <button type="submit" class="btn btn-outline-primary">Додати категорію</button>
                </form>

                <h3 class="h5">Список категорій</h3>
                <div id="adminCategoriesList"></div>
            </section>
            </div>
        </section>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
