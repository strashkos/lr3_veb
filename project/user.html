<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кабінет користувача</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="css/user.css">
</head>

<body class="bg-light">
    <div class="container py-4">
        <h1 class="display-6">Кабінет користувача</h1>
        <a href="index.html" class="back-link btn btn-outline-secondary btn-sm mb-4">← На головну</a>

        <section id="authSection" class="grid-boxes">
            <div class="box card shadow-sm">
                <div class="card-body">
                <h2 class="h4">Реєстрація</h2>
                <form id="registerForm" class="form-block">
                    <input type="text" id="registerName" class="form-control" placeholder="Ваше ім'я">
                    <input type="email" id="registerEmail" class="form-control" placeholder="Email">
                    <input type="password" id="registerPassword" class="form-control" placeholder="Пароль">
                    <input type="password" id="registerConfirmPassword" class="form-control" placeholder="Підтвердіть пароль">
                    <button type="submit" class="btn btn-primary">Зареєструватись</button>
                </form>
                <p id="registerMessage" class="message"></p>
                </div>
            </div>

            <div class="box card shadow-sm">
                <div class="card-body">
                <h2 class="h4">Вхід</h2>
                <form id="loginForm" class="form-block">
                    <input type="email" id="loginEmail" class="form-control" placeholder="Email">
                    <input type="password" id="loginPassword" class="form-control" placeholder="Пароль">
                    <button type="submit" class="btn btn-success">Увійти</button>
                </form>
                <p id="loginMessage" class="message"></p>
                </div>
            </div>
        </section>

        <section id="accountSection" class="box hidden card shadow-sm">
            <div class="card-body">
            <div class="account-top">
                <div>
                    <h2 class="h4">Особистий кабінет</h2>
                    <p>Ім'я: <span id="profileName"></span></p>
                    <p>Email: <span id="profileEmail"></span></p>
                </div>
                <button id="logoutUserBtn" class="logout-btn btn btn-danger">Вийти</button>
            </div>

            <h3 class="h5">Мої замовлення</h3>
            <div id="userOrdersList"></div>
            </div>
        </section>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/user.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
